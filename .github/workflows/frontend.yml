name: Frontend CI

on:
  push:
    branches: [main, develop]
    paths:
      - 'diffsurge-frontend/**'
      - '.github/workflows/frontend.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'diffsurge-frontend/**'
      - '.github/workflows/frontend.yml'

defaults:
  run:
    working-directory: diffsurge-frontend

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: diffsurge-frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build
